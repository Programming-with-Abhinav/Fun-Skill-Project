<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			.box {
				height: 121px;
				width: 121px;
				background-color: red;
				border-radius: 50%;
				position: absolute;
				bottom: 0;
				left: 0;
				animation: move 4s ease-in-out infinite forwards 1s;
			}

			.container {
				position: relative;
				height: 80vh;
				width: 80vw;
				background-color: blue;
			}

			.wrapper {
				position: absolute;
				bottom: 0;
				left: 0;
				animation: animate-x 4s linear infinite , animate-y 1s ease-out infinite alternate;
			}
			@keyframes animate-x {
				from {
					left: 0;
				}
				to {
					left: 100%;
				}
			}

			@keyframes animate-y {
				from {
					bottom: 0;
				}
				to {
					bottom: 100%;
				}
			}
		</style>
	</head>

	<body>
		<div class="container">
			<div class="wrapper ">
				<div class="box"> </div>
			</div>
			
		</div>
	</body>
</html>
