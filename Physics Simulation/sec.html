<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .container {
        position: relative;
        height: 80vh;
        width: 80vw;
        background-color: blue;
        overflow: hidden;
      }

      .ball-wrapper {
        position: absolute;
        bottom: 0;
        left: 0;
        animation: move-x 4s linear infinite alternate;
      }

      .box {
        height: 121px;
        width: 121px;
        background-color: red;
        border-radius: 50%;
        transform-origin: bottom center;
        animation: bounce-y 4s infinite alternate;
      }

      @keyframes move-x {
        0% {
          transform: translateX(0px);
        }
        100% {
          transform: translateX(75vw);
        }
      }

      @keyframes bounce-y {
        0% {
          transform: translateY(0) scaleY(0.6) scaleX(1.4);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        3% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        15% {
          transform: translateY(-300px) scaleY(1.1) scaleX(0.9);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        27% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        30% {
          transform: translateY(0) scaleY(0.7) scaleX(1.3);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        33% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        48% {
          transform: translateY(-180px) scaleY(1.08) scaleX(0.92);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        62% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        65% {
          transform: translateY(0) scaleY(0.8) scaleX(1.2);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        68% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        80% {
          transform: translateY(-70px) scaleY(1.05) scaleX(0.95);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        91% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        93% {
          transform: translateY(0) scaleY(0.9) scaleX(1.1);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        95% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 1.05, 0.7, 1);
        }
        97% {
          transform: translateY(-15px) scaleY(1.02) scaleX(0.98);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        99% {
          transform: translateY(0) scaleY(1) scaleX(1);
          animation-timing-function: cubic-bezier(0.3, 0, 0.7, -0.05);
        }
        100% {
          transform: translateY(0) scaleY(0.95) scaleX(1.05);
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="ball-wrapper">
        <div class="box"></div>
      </div>
    </div>
  </body>
</html>
