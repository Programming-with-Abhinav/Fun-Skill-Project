<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Card</title>
		<link rel="stylesheet" href="style.css" />
	</head>
	<body>
		<div class="main-box">
			<div class="img-box">
				<img src="card-image.png" alt="lake-photo" />
			</div>
			<div class="caption-box">
				<span>Good Looking</span>
				<span>Hard Working</span>
			</div>
			<h1>Happy Time for Men</h1>
			<p>
				"Some sunsets are beautiful, but this one became unforgettable because I
				watched it with you. In this quiet moment by the lake, the world felt
				perfectly complete." 🌅❤️
			</p>
			<div class="btn-box">
				<button>Read More</button>
			</div>
		</div>
	</body>
</html>
